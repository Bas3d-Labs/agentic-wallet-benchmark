# Publishes results dashboard to GitHub Pages.
# First run: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy results site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare static site
        run: |
          mkdir -p .pages-publish
          cp index.html .nojekyll .pages-publish/
          cp -r results .pages-publish/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
